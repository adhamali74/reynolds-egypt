<!doctype html>
<html lang="en" dir="ltr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Reynolds Egypt — Alexandria-based freight forwarding & logistics. Sea, air, land, customs. Shipping reimagined for the AI era."
    />
    <title>Reynolds Egypt — Shipping Reimagined for the AI Era</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Cairo:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Hydrate saved theme + language synchronously so we never render the
         wrong colour scheme or text direction for a frame on page load. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("reynolds.theme");
          if (t !== "light" && t !== "dark") t = "dark";
          document.documentElement.setAttribute("data-theme", t);
          document.documentElement.style.colorScheme = t;

          var l = localStorage.getItem("reynolds.lang");
          if (l !== "en" && l !== "ar") l = "en";
          document.documentElement.setAttribute("lang", l);
          document.documentElement.setAttribute("dir", l === "ar" ? "rtl" : "ltr");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
